<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spread Share Web</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Panel Izquierdo: Controles -->
        <div class="sidebar">
            <h2>Spread Parameters</h2>
            
            <div class="input-group">
                <label>Spread Type:</label>
                <div class="toggle-container" id="spread_type_toggle">
                    <button type="button" class="toggle-btn active" data-value="CCS">Call Credit Spread (CCS)</button>
                    <button type="button" class="toggle-btn" data-value="PCS">Put Credit Spread (PCS)</button>
                </div>
                <input type="hidden" id="spread_type" value="CCS">
            </div>

            <div class="input-group">
                <label>Expiration Date (0 DTE default):</label>
                <select id="expiration_menu">
                    <option>Searching...</option>
                </select>
            </div>

            <div class="input-group">
                <label>Sell Strike:</label>
                <input type="number" id="short_strike" placeholder="e.g. 7500" step="5">
            </div>

            <div class="input-group">
                <label>Buy Strike:</label>
                <input type="number" id="long_strike" placeholder="e.g. 7520" step="5">
            </div>

            <div class="input-group">
                <label>Net Credit / Premium:</label>
                <input type="number" id="net_credit" placeholder="e.g. 10 (Auto calculated)" step="0.05">
            </div>

            <div class="input-group">
                <label>Current SPX Price:</label>
                <div class="price-row">
                    <input type="text" id="current_price" readonly>
                    <button id="btn_refresh_price" class="btn-secondary">Refresh</button>
                </div>
            </div>

            <div class="input-group">
                <label>Comment (WhatsApp):</label>
                <textarea id="txt_comment" rows="3" placeholder="Write your analysis here..."></textarea>
            </div>

            <button id="btn_share" class="btn-success">Share to WhatsApp</button>

            <div id="status_msg" class="status">Initializing...</div>
        </div>

        <!-- Panel Derecho: Gráfica -->
        <div class="main-content">
            <div class="chart-container">
                <img id="chart_img" src="" alt="Spread Chart" style="display: none;">
                <div id="chart_placeholder" class="placeholder">
                    Enter data and click "Calculate and Plot"
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
