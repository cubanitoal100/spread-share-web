<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spread Share Web</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>Spread Parameters</h2>

            <div class="input-group">
                <label>Ticker:</label>
                <div class="ticker-combobox" id="ticker_combobox">
                    <input type="text" id="ticker_input" placeholder="Search ticker..." autocomplete="off">
                    <div class="ticker-dropdown" id="ticker_dropdown"></div>
                </div>
            </div>

            <div class="input-group">
                <label>Strategy:</label>
                <select id="strategy_select">
                    <option value="PCS">Put Credit Spread</option>
                    <option value="CCS">Call Credit Spread</option>
                    <option value="IC">Iron Condor</option>
                    <option value="IB">Iron Butterfly</option>
                    <option value="CSP">Cash Secured Put</option>
                    <option value="CC">Covered Call</option>
                    <option value="JL">Jade Lizard</option>
                </select>
            </div>

            <div class="input-group">
                <label>Expiration Date:</label>
                <select id="expiration_menu">
                    <option>Loading...</option>
                </select>
            </div>

            <div id="strikes_container"></div>

            <div class="input-group">
                <label>Net Credit / Premium:</label>
                <input type="number" id="net_credit" placeholder="Auto-calculated" step="0.05" readonly>
            </div>

            <div class="input-group">
                <label>Current Price:</label>
                <div class="price-row">
                    <input type="text" id="current_price" readonly>
                    <button id="btn_refresh_price" class="btn-secondary">Refresh</button>
                </div>
            </div>

            <div class="input-group">
                <label>Comment (WhatsApp):</label>
                <textarea id="txt_comment" rows="3" placeholder="Write your analysis here..."></textarea>
            </div>

            <button id="btn_share" class="btn-success">Share to WhatsApp</button>

            <div id="status_msg" class="status">Initializing...</div>
        </div>

        <div class="main-content">
            <div class="chart-container">
                <img id="chart_img" src="" alt="Spread Chart" style="display: none;">
                <div id="chart_placeholder" class="placeholder">
                    Select a strategy and enter strikes
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
